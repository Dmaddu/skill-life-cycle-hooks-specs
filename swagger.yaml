      - =
      - '!='
      - CONTAINS
      - MATCHES
      example: =
      nullable: true
      title: filter-operator
      type: string
    filter-skill-setting:
      description: Skill level settings to be matched.
      example:
        skillName: chef-infra-client
        value:
        - value
        - value
        operator: =
        settingName: environment
      properties:
        skillName:
          description: The name of the skill
          example: chef-infra-client
          type: string
        settingName:
          description: The name of the setting key
          example: environment
          type: string
        operator:
          $ref: "#/components/schemas/filter-operator"
        value:
          description: |
            A list of values to match an matched setting value with the setting name.
          items:
            type: string
          type: array
      title: filter-skill-setting
      type: object
    filter-operator-compare:
      description: |
        "=": Checks if two values are identical. "!=": Tests if two values are different.
      enum:
      - =
      - '!='
      example: =
      title: filter-operator-compare
      type: string
