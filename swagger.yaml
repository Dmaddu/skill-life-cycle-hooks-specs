    filter-attribute:
      description: |
        Represents a filter on node's attributes.
      example:
        name: kernel_name
        namespace:
        - agent
        value:
        - value
        - value
        operator: =
      properties:
        name:
          description: |
            The name of the attribute.  The node agents collect data on the following authoritative attribute names:  kernel_name, architecture, hostname, os_name, os_version, kernel_version, primary_ip, netmask, and time_zone.
          example: kernel_name
          type: string
        namespace:
          description: The attribute's namespace.
          example:
          - agent
          items:
            type: string
          type: array
        operator:
          $ref: "#/components/schemas/filter-operator"
        value:
          description: |
            A list of values to match an attribute value.  The operator will be applied to each value individually.  If the array contains more than one value, it is equivalent to using the IN operator.
          items:
            type: string
          type: array
      title: filter-attribute
      type: object
    filter-skill:
      description: |
        Represents a filter on node's installed skills..
      example:
        name: chef-infra-client
        type: Canister
        version:
        - <= 18.1.0
        - <= 18.1.0
      properties:
        name:
          description: The name of the skill.
          example: chef-infra-client
          type: string
        type:
          $ref: "#/components/schemas/skill-type"
        version:
          description: |
            A list of values to match on a skill version.  Each value takes the form '[symbol] [version]'.  Valid symbols include '=', '!=', '<', '>', '<=', and '>='.  The version should be any valid SemVer (Semantic Versioning).  Multiple version constraints can be applied to the skill.
          items:
            $ref: "#/components/schemas/filter-skill-version"
          type: array
      title: filter-skill
      type: object
    filter-override-settings:
      description: |
        Represents a filter on node's override settings.
      example:
        skillSettings:
        - skillName: chef-infra-client
          value:
          - value
          - value
          operator: =
          settingName: environment
        - skillName: chef-infra-client
          value:
          - value
          - value
          operator: =
          settingName: environment
        name:
        - production
        operator: =
      properties:
        name:
          description: An array of override settings group names.
          example:
          - production
          items:
            type: string
          type: array
        operator:
          $ref: "#/components/schemas/filter-operator-override-setting"
        skillSettings:
          items:
            $ref: "#/components/schemas/filter-skill-setting"
          type: array
      title: filter-override-settings
      type: object
    filter-enrollment-level:
      description: |
        Represents a filter on a node's enrollment level. The enrollment levels include 'admitted', 'inducted', 'registered', and 'enrolled'.
      example:
        value:
        - admitted
        operator: =
      properties:
        operator:
          $ref: "#/components/schemas/filter-operator-compare"
        value:
          description: |
            "A list of values to match the enrollment level. The operator will be applied to each value individually.  If the array contains more than one value, it is equivalent to using the IN operator.
          example:
          - admitted
          items:
            type: string
          type: array
      title: filter-enrollment-level
      type: object
    filter-enrollment-source:
      description: |
        Represents a filter on a node's enrollment source. The enrollment sources include 'csv', 'cmdb', 'added_individually', 'cloud','inspec_cloud','enrollment','discovery', and 'enrollment-cli'.
      example:
        value:
        - enrollment-cli
        operator: =
      properties:
        operator:
          $ref: "#/components/schemas/filter-operator-compare"
        value:
          description: |
            "A list of values to match the enrollment source. The operator will be applied to each value individually.  If the array contains more than one value, it is equivalent to using the IN operator.
          example:
          - enrollment-cli
          items:
            type: string
          type: array
      title: filter-enrollment-source
      type: object
    filter-health-status:
      description: |
        Represents a filter on a node's health status. The health statuses include 'online', 'waiting', 'ready', 'reachable', 'offline', and 'unknown'.
      example:
        value:
        - offline
        operator: =
      properties:
        operator:
          $ref: "#/components/schemas/filter-operator-compare"
        value:
          description: |
            "A list of values to match the health status. The operator will be applied to each value individually.  If the array contains more than one value, it is equivalent to using the IN operator.
          example:
          - offline
          items:
            type: string
          type: array
      title: filter-health-status
      type: object
    skill-rule-action:
      description: |
        "add": Adds a skill matching the specified rule. "remove": Removes one or more skills (of the same type) specified by the version range.
      enum:
      - add
      - remove
      example: add
      title: skill-rule-action
      type: string
    skill-rule-skill:
      description: |
        This defines the skill data that is considered when applying a skill rule.
      example:
        name: chef-gohai
        channel: stable
        value:
        - value
        - value
      properties:
        name:
          description: The name of the skill
          example: chef-gohai
          type: string
        channel:
          description: An optional builder channel to look for the skill (when adding)
          example: stable
          type: string
        value:
          description: |
            An array of versions that must be considered, where each item in the array can take the form: ^([<>!=]=?\s*)?\d+(.\d+)?(.\d+)?$ Some examples of valid entries include: 17, 17.1, 17.1.0, < 12, <= 12.4 Additionally, the "add rule" should specify the exact version without any operator
          items:
            type: string
          type: array
      title: skill-rule-skill
      type: object
    skill-rule-hooks:
      description: |
        Lifecycle hook mappings for a skill rule. Each stage optionally references a pre-created hook by ID. The referenced hook script will execute on the remote node at the corresponding point in the skill lifecycle. Supported stages: preInstall, postInstall, preDelete, postDelete.
      example:
        preInstall: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        postInstall: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        postDelete: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        preDelete: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
      properties:
        preInstall:
          description: a Guid
          format: uuid
          pattern: "[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}"
          title: UUID
          type: string
        postInstall:
          description: a Guid
          format: uuid
          pattern: "[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}"
          title: UUID
          type: string
        preDelete:
          description: a Guid
          format: uuid
          pattern: "[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}"
          title: UUID
          type: string
        postDelete:
          description: a Guid
          format: uuid
          pattern: "[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}"
          title: UUID
          type: string
      title: skill-rule-hooks
      type: object
    filter-operator:
      description: |
        "=": Checks if two values are identical. "!=": Tests if two values are different. "CONTAINS": Verifies if one value is within another. "MATCHES": Searches for patterns using regular expressions.
      enum:
      - =
      - '!='
      - CONTAINS
      - MATCHES
      example: =
      title: filter-operator
      type: string
    skill-type:
      description: |
        "Canister": Skill installed as a Chef Habitat package. "Native": Represents a skill installed natively.
      enum:
      - Canister
      - Native
      example: Canister
      title: skill-type
      type: string
    filter-skill-version:
      description: a skill version
      example: <= 18.1.0
      pattern: "^(=|!=|<|>|<=|>=){1}\\s+\\d+(\\.\\d+)+$"
      title: version
      type: string
    filter-operator-override-setting:
      description: |
