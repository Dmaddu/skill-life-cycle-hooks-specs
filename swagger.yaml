    node-hook-inline:
      description: |
        A compact hook representation included in the check-in response. Contains the hook identifier, OS-specific scripts, and execution timeout so the agent can execute the hook without an additional API call. The agent runs the script matching its OS and silently skips if no script is available for its OS.
      example:
        windowsScript: V3JpdGUtSG9zdCAnUnVubmluZyBwcmUtY29udmVyZ2UgaG9vaycK
        timeoutSeconds: 60
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        linuxScript: IyEvYmluL2Jhc2gKZWNobyAnUnVubmluZyBwcmUtY29udmVyZ2UgaG9vaycK
      properties:
        id:
          description: a Guid
          format: uuid
          pattern: "[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}"
          title: UUID
          type: string
        linuxScript:
          description: |
            Base64-encoded script for Linux nodes (interpreted by bash). Absent if no Linux script was defined for this hook.
          example: IyEvYmluL2Jhc2gKZWNobyAnUnVubmluZyBwcmUtY29udmVyZ2UgaG9vaycK
          format: byte
          type: string
        windowsScript:
          description: |
            Base64-encoded script for Windows nodes (interpreted by PowerShell). Absent if no Windows script was defined for this hook.
          example: V3JpdGUtSG9zdCAnUnVubmluZyBwcmUtY29udmVyZ2UgaG9vaycK
          format: byte
          type: string
        timeoutSeconds:
          description: |
            Maximum number of seconds the agent waits for this hook to complete before killing the process and reporting a timeout failure.
          example: 60
          format: int32
          minimum: 1
          type: integer
      required:
      - id
      - timeoutSeconds
      title: node-hook-inline
      type: object
