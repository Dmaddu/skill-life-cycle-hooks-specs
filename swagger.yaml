    skill-config-template:
      description: |
        Skill configuration template
      example:
        fileName: config.rb
        filePath: /etc/chef
        windowsFilePath: c:/chef
        name: name
        content: Y2hlZl9zZXJ2ZXJfdXJsICAne3suc2V0dGluZ3MuY2hlZl9zZXJ2ZXJfdXJsfX0nXG52YWxpZGF0aW9uX2NsaWVudF9uYW1lICd7ey5zZXR0aW5ncy52YWxpZGF0aW9uX2NsaWVudF9uYW1lfX0nXG52YWxpZGF0aW9uX2tleSAne3suc2V0dGluZ3MudmFsaWRhdGlvbl9rZXl9fSdcbmNsaWVudF9rZXkgJ3t7LnNldHRpbmdzLmNsaWVudF9rZXl9fSdcbg==
      properties:
        name:
          description: Name of the configuration template
          type: string
        content:
          description: Base64 encoded content for the configuration.
          example: Y2hlZl9zZXJ2ZXJfdXJsICAne3suc2V0dGluZ3MuY2hlZl9zZXJ2ZXJfdXJsfX0nXG52YWxpZGF0aW9uX2NsaWVudF9uYW1lICd7ey5zZXR0aW5ncy52YWxpZGF0aW9uX2NsaWVudF9uYW1lfX0nXG52YWxpZGF0aW9uX2tleSAne3suc2V0dGluZ3MudmFsaWRhdGlvbl9rZXl9fSdcbmNsaWVudF9rZXkgJ3t7LnNldHRpbmdzLmNsaWVudF9rZXl9fSdcbg==
          type: string
        fileName:
          description: The name of the file to render the configuration.
          example: config.rb
          type: string
        filePath:
          description: The path used to render the configuration template on Linux-based
            systems.
          example: /etc/chef
          type: string
        windowsFilePath:
          description: The path used to render the configuration template on Windows.
          example: c:/chef
          type: string
      required:
      - content
      - fileName
      title: skill-config-template
      type: object
    validation:
      allOf:
      - $ref: "#/components/schemas/error"
      description: |
        A field/data object validation error
      example:
        context: "{}"
      properties:
        context:
          properties:
            field:
              description: |
                the property that failed validation, this is in the json path format for nested properties
              example: name
              readOnly: true
              type: string
            value:
              description: the value that failed validation
              example: smith
              readOnly: true
              type: string
            condition:
              description: |
                The rules that failed validation. NOTE: this field may be null
              readOnly: true
              type: string
            argument:
              description: "The argument to the rule, used for items such as max value"
              readOnly: true
              type: string
          type: object
      title: wrapper-validation-item
      type: object
    error:
      description: Generic error
      example:
        reason: FileNotFound
        help: http://errors.chef.io/?code=1234
        service: courier-scheduler
        context:
          key: ""
        message: The file requested is locked and can not be edited.
      properties:
        service:
          description: |
            Unique identifier for the service raising this error.  This helps distinguish service-specific errors (i.e. error inserting an event in a calendar)  from general protocol errors (i.e. file not found).
          example: courier-scheduler
          type: string
        reason:
          description: |
            Unique identifier for this error.  Different from the error.code property in that this is not an http response code.
          example: FileNotFound
          readOnly: true
          type: string
        message:
          description: "A human readable message providing more details about the\
            \ error. \n"
          example: The file requested is locked and can not be edited.
          type: string
        context:
          additionalProperties: true
          description: |
            a key value pair of additional information required to understand the error
          type: object
        help:
          description: |
            A URI for a help text that might shed some more light on the error.
          example: http://errors.chef.io/?code=1234
          pattern: "[-a-zA-Z0-9@:%._\\+~#=]{1,256}\\.[a-zA-Z0-9()]{1,6}\\b([-a-zA-Z0-9()@:%_\\\
            +.~#?&//=]*)"
          type: string
      required:
      - reason
      - service
      title: generic-error-item
      type: object
