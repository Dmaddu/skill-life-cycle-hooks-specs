      description: |
        A hook is a script that executes on a remote node. It carries OS-specific scripts: the agent runs the script matching its operating system and silently skips the hook if no script is provided for its OS.
      example:
        createdAt: 2000-01-23T04:56:07.000+00:00
        windowsScript: V3JpdGUtSG9zdCAnUnVubmluZyBwcmUtY29udmVyZ2UgaG9vaycK
        name: pre-converge-hook
        description: Runs a setup script before Chef Infra converge
        timeoutSeconds: 60
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        linuxScript: IyEvYmluL2Jhc2gKZWNobyAnUnVubmluZyBwcmUtY29udmVyZ2UgaG9vaycK
        updatedAt: 2000-01-23T04:56:07.000+00:00
      properties:
        id:
          description: a Guid
          format: uuid
          pattern: "[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}"
          title: UUID
          type: string
        name:
          description: Name of the hook
          example: pre-converge-hook
          type: string
        description:
          description: Description of the hook
          example: Runs a setup script before Chef Infra converge
          type: string
        linuxScript:
          description: |
            Base64-encoded script executed on Linux nodes (interpreted by bash). Absent if no Linux script was provided.
          example: IyEvYmluL2Jhc2gKZWNobyAnUnVubmluZyBwcmUtY29udmVyZ2UgaG9vaycK
          format: byte
          type: string
        windowsScript:
          description: |
            Base64-encoded script executed on Windows nodes (interpreted by PowerShell). Absent if no Windows script was provided.
          example: V3JpdGUtSG9zdCAnUnVubmluZyBwcmUtY29udmVyZ2UgaG9vaycK
          format: byte
          type: string
        timeoutSeconds:
          description: |
            Maximum number of seconds the agent waits for the hook to complete before killing the process and reporting a timeout failure.
          example: 60
          format: int32
          minimum: 1
          type: integer
        createdAt:
          description: a DateTime in ISO8601
          format: date-time
          title: Datetime
          type: string
        updatedAt:
          description: a DateTime in ISO8601
          format: date-time
          title: Datetime
          type: string
      required:
      - id
      - name
      title: hook
      type: object
    hook-create:
      description: |
        Payload for creating a new hook. At least one of linuxScript or windowsScript must be provided. The agent will execute the script matching its operating system and silently skip the hook if no script is available for its OS.
      properties:
        name:
          description: Name of the hook
          example: pre-converge-hook
          type: string
        description:
          description: Description of the hook
          example: Runs a setup script before Chef Infra converge
          type: string
        linuxScript:
          description: |
            Base64-encoded script executed on Linux nodes (interpreted by bash). Required if windowsScript is not provided.
          example: IyEvYmluL2Jhc2gKZWNobyAnUnVubmluZyBwcmUtY29udmVyZ2UgaG9vaycK
          format: byte
          type: string
        windowsScript:
          description: |
            Base64-encoded script executed on Windows nodes (interpreted by PowerShell). Required if linuxScript is not provided.
          example: V3JpdGUtSG9zdCAnUnVubmluZyBwcmUtY29udmVyZ2UgaG9vaycK
          format: byte
          type: string
        timeoutSeconds:
          default: 300
          description: |
            Maximum number of seconds the agent waits for the hook to complete before killing the process and reporting a timeout failure. Defaults to 300.
          example: 60
          format: int32
          minimum: 1
          type: integer
      required:
      - name
      title: hook-create
      type: object
    hook-update:
      description: |
        Payload for updating an existing hook. All fields replace the current values. At least one of linuxScript or windowsScript must be provided.
      properties:
        name:
          description: Name of the hook
          example: pre-converge-hook
          type: string
        description:
          description: Description of the hook
          example: Runs a setup script before Chef Infra converge
          type: string
        linuxScript:
          description: |
            Base64-encoded script executed on Linux nodes (interpreted by bash). Required if windowsScript is not provided.
          example: IyEvYmluL2Jhc2gKZWNobyAnVXBkYXRlZCBwcmUtY29udmVyZ2UgaG9vaycK
          format: byte
          type: string
        windowsScript:
          description: |
            Base64-encoded script executed on Windows nodes (interpreted by PowerShell). Required if linuxScript is not provided.
          example: V3JpdGUtSG9zdCAnVXBkYXRlZCBwcmUtY29udmVyZ2UgaG9vaycK
          format: byte
          type: string
        timeoutSeconds:
          default: 300
          description: |
            Maximum number of seconds the agent waits for the hook to complete before killing the process and reporting a timeout failure. Defaults to 300.
          example: 60
          format: int32
          minimum: 1
          type: integer
      required:
      - name
      title: hook-update
      type: object
    wrapper-kind:
      enum:
      - object
      - empty
      - error
      - list
      - paginated
      type: string
    params:
      description: a key value pair of parameters used in this response
      example:
        header:
          TenantId: 253c0912-67f0-4fae-8723-91614ade5474
          OrganizationId: 2936634b-9760-40a2-9bdd-73291345cfdd
          UserId: f25f4511-5e2a-4018-983f-acbce79184e3
          If-Match: 33a64df551425fcc55e4d42a148795d9f25f89d4
        path:
          NodeId: 7375ef03-794a-460b-9f7b-47f6faf7400e
        query:
          page: "3"
          name: example
      properties:
        header:
          additionalProperties: true
          type: object
        path:
          additionalProperties: true
          type: object
        query:
          additionalProperties: true
          type: object
      title: params
      type: object
    pagination:
      description: paginated list/search results details
      properties:
        pageItemCount:
          description: |
            The number of items in this result set. Should be equivalent to items.length, and is provided as a convenience property.  For example, suppose a developer requests a set of search items, and asks for 10 items per page.  The total set of that search has 14 total items. The first page of items will have 10 items in it,  so both itemsPerPage and pageItemCount will equal "10". The next page of items will have the remaining 4 items;  itemsPerPage will still be "10", but pageItemCount will be "4".
          minimum: 0
          type: integer
        itemsPerPage:
          description: |
            The number of items in the result. This is not necessarily the size of the data.items array;  if we are viewing the last page of items, the size of data.items may be less than itemsPerPage. However the size of data.items should not exceed itemsPerPage.
          maximum: 100
          minimum: 10
          type: integer
        startIndex:
          description: |
            The index of the first item in data.items. For consistency, startIndex should be 1-based.  For example, the first item in the first set of items should have a startIndex of 1.  If the user requests the next set of data, the startIndex may be 10.
          maximum: 32767
          minimum: 1
          type: integer
        totalItems:
          description: |
            The total number of items available in this set. For example, if a user has 100 blog posts,  the response may only contain 10 items, but the totalItems would be 100.
          minimum: 0
          type: integer
        page:
          description: |
            The index of the current page of items. For consistency, page should be 1-based. For example,  the first page of items has a page of 1. page can also be calculated from the item-based paging  properties: page = floor(startIndex / itemsPerPage) + 1.
          minimum: 1
          type: integer
        totalPages:
          description: |
            The total number of pages in the result set. totalPages can also be calculated from the item-based paging  properties above: totalPages = ceiling(totalItems / itemsPerPage).
          minimum: 0
          type: integer
        previousLink:
          description: |
            The previous link indicates how more data can be retrieved. It points to the location to load the previous set of data.  It can be used in conjunction with the itemsPerPage, startIndex and totalItems properties in order to page through data.
          type: string
        nextLink:
          description: "The next link indicates how more data can be retrieved. It\
            \ points to the location to load the next set of data.  It can be used\
            \ in conjunction with the itemsPerPage, startIndex and totalItems properties\
            \ in order to  page through data."
          type: string
      required:
      - itemsPerPage
      - page
      - pageItemCount
      - startIndex
      - totalItems
      - totalPages
      title: pagination
      type: object
    skill-canister:
      description: |
        Canister Skill Definition
      example:
        service: false
        origin: core
        name: chef-infra-client
      properties:
        origin:
          description: The origin of the canister.
          example: core
          type: string
        name:
          description: The name of the canister.
          example: chef-infra-client
          type: string
