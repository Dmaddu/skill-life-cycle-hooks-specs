openapi: 3.0.3
info:
  contact:
    email: support@chef.io
    name: API Support
    url: http://www.chef.io/support
  description: |
    Node Management is a facility by which users can manage their organization’s fleet (nodes) and the set of skills on their fleet. A node could be a server, virtual machine, desktop, kiosk, network device, virtual/cloud device, or edge device.
    A skill (Infra Client, InSpec, etc.) is a tool installed on the node. A node can have a skill such as a canister (a habitat package), native package, or both.
  license:
    name: EULA
    url: https://www.chef.io/end-user-license-agreement
    x-identifier: LicenseRef-EULA
  termsOfService: https://www.chef.io/online-master-agreement
  title: Chef node management
  version: 1.4.31
  x-service-domain: node
  x-domain-service: management
externalDocs:
  description: docs.chef.io
  url: https://docs.chef.io
servers:
- description: example server
  url: "https://{uri}/{service-domain}/{service}/{version}"
  variables:
    uri:
      default: echo.zuplo.io
    service-domain:
      default: node
      enum:
      - node
    service:
      default: management
      enum:
      - management
    version:
      default: v1
      enum:
      - v1
security:
- apiKey: []
  apiSecret: []
- oauth: []
- jwt: []
- signed: []
tags:
- description: Skill Assembly Management
  name: Assembly
- description: Node Cohort Management
  name: Cohort
- description: Node Filter Management
  name: Filter
- description: Hook Management
  name: Hook
- description: Node List Management
  name: List
- description: Node Management
  name: Node
- description: Skill Setting Management
  name: Setting
- description: Skill Definition Management
  name: Skill
paths:
  /skills:
    get:
      description: |
        This method will list all skill definitions related to management in the current organization.
      operationId: skills.find-all-skills
      parameters:
      - description: items per page
        example: 10
        explode: false
        in: query
        name: pagination.size
        required: false
        schema:
          type: integer
        style: form
        x-default: 10
      - description: what page of the pagination
        example: 1
        explode: false
        in: query
        name: pagination.page
        required: false
        schema:
          type: integer
        style: form
        x-default: 1
      responses:
        "200":
          content:
            application/json:
              example:
                kind: paginated
                code: 200
                params:
                  query:
                    pagination:
                      start: 2
                pagination:
                  pageItemCount: 4
                  itemsPerPage: 10
                  startIndex: 11
                  totalItems: 14
                  page: 2
                  totalPages: 2
                  previousLink: ?pagination.start=1
                items:
                - name: chef-infra-client
                  canister:
                    origin: chef
                    name: chef-infra-client
                  native:
                    versionCommand: chef-client --version
                  configurationTemplates:
                  - content: Y2hlZl9zZXJ2ZXJfdXJsICAne3suc2V0dGluZ3MuY2hlZl9zZXJ2ZXJfdXJsfX0nXG52YWxpZGF0aW9uX2NsaWVudF9uYW1lICd7ey5zZXR0aW5ncy52YWxpZGF0aW9uX2NsaWVudF9uYW1lfX0nXG52YWxpZGF0aW9uX2tleSAne3suc2V0dGluZ3MudmFsaWRhdGlvbl9rZXl9fSdcbmNsaWVudF9rZXkgJ3t7LnNldHRpbmdzLmNsaWVudF9rZXl9fSdcbg==
                    fileName: config.rb
                    filePath: /etc/chef
                    windowsFilePath: c:/chef
                - name: chef-gohai
                  canister:
                    origin: chef-platform
                    name: chef-gohai
                  configurationTemplates:
                  - content: 
                    fileName: user.toml
                    filePath: /etc/chef-platform/chef-gohai
                    windowsFilePath: c:/ProgramData/chef-platform/chef-gohai
              schema:
                $ref: "#/components/schemas/skill_list_response"
          description: A paginated skill definition results
        "422":
          content:
            application/json:
              example:
                kind: error
                code: 422
                message: Unprocessable Content
                errors:
                - service: validation
                  reason: Regex"
                  message: The document failed data validation
                  context:
                    field: field1
                    value: abcd
                    condition: Integer
                - service: validation
                  reason: Regex"
                  message: The document failed data validation
                  context:
                    field: field3.subField
                    value: "1234"
                    condition: MaxValue
                    argument: "100"
                - service: validation
                  reason: Regex"
                  message: The document failed data validation
                  context:
                    field: "field5[4]"
                    value: abcd
                    condition: Expression
                    argument: ^The
                - service: validation
                  reason: Regex"
                  message: The document failed data validation
                  context:
                    field: "field6[4].subField"
                    value: null
                    condition: Required
                - service: validation
                  reason: Regex"
                  message: The document failed data validation
                  context:
                    field: field6.subField.subField
                    value: null
                    condition: Required
              schema:
                $ref: "#/components/schemas/wrapper-validation"
          description: |
            The request failed data validation -  the syntax of a request entity for a 422 error is correct but  the data in the request failed validation
        "401":
          content:
            application/json:
              example:
                kind: error
                code: 401
                message: Unauthorized
                errors:
                - service: gateway
                  reason: Missing-Credentials
                  message: The client request has not been completed because it lacks
                    valid authentication credentials for the requested resource.
              schema:
                $ref: "#/components/schemas/wrapper-error"
          description: |
            Indicates that the request requires user authentication information.  This should be returned by the API Gateway if the credentials are missing (or session is expired)  or by a service if the message signature is missing or invalid
        "403":
          content:
            application/json:
              example:
                kind: error
                code: 403
                message: Forbidden
                errors:
                - service: gateway
                  reason: Route-Deny
                  message: Insufficient permissions to access the requested resource
